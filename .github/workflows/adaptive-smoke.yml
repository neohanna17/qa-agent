name: Levi — Adaptive Smoke Test

on:
  workflow_dispatch:
    inputs:
      custom_url:
        description: 'Website URL to audit (required)'
        required: true
        type: string
      site_name:
        description: 'Client / site name (for PDF report)'
        required: false
        type: string
      site_type:
        description: 'Platform — leave blank to auto-detect'
        required: false
        type: choice
        options:
          - ''
          - wordpress
          - elementor
          - divi
          - gutenberg
          - woocommerce
          - shopify
          - squarespace
          - wix
          - webflow
          - react
          - custom
        default: ''
      site_namespace:
        description: 'Firebase key (auto-generated from URL if blank)'
        required: false
        type: string
      client_id:
        description: 'Client ID (optional)'
        required: false
        type: string

jobs:
  levi-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Levi Audit
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          CUSTOM_URL:      ${{ inputs.custom_url }}
          SITE_NAME:       ${{ inputs.site_name }}
          SITE_TYPE:       ${{ inputs.site_type }}
          SITE_NAMESPACE:  ${{ inputs.site_namespace }}
          CLIENT_ID:       ${{ inputs.client_id }}
          GITHUB_RUN_ID:   ${{ github.run_id }}
        run: node scripts/adaptive-smoke.js
