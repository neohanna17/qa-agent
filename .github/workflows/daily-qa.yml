name: Daily QA Smoke Tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Run a single site by ID (leave empty to run all sites)'
        required: false
        default: ''

jobs:
  smoke-test:
    name: Run AI Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Show file structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== SCRIPTS FOLDER ==="
          ls -la scripts/ || echo "NO SCRIPTS FOLDER FOUND"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          SINGLE_SITE: ${{ github.event.inputs.site_id }}
        run: node scripts/smoke-test.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_id }}
          path: /tmp/qa-screenshots/
          retention-days: 7
